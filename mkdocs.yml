site_name: iontrap-dynamics
site_description: Open-system quantum dynamics of trapped-ion spin-motion systems
# site_url is the GitHub Pages serving URL — used by mkdocs-material for
# canonical link tags, sitemap.xml, and the "Edit on GitHub" / share-link
# helpers. Deployed by .github/workflows/docs-deploy.yml; requires
# Settings → Pages → Source: "GitHub Actions" to be set on the repo.
# On migration to `open-iontrap` (workplan §4), swap `uwarring82` →
# `open-iontrap` in all three URL lines below.
site_url: https://uwarring82.github.io/iontrap-dynamics/
repo_url: https://github.com/uwarring82/iontrap-dynamics
repo_name: uwarring82/iontrap-dynamics

theme:
  name: material
  language: en
  # `material/atom-variant` is an icon shortcode rendered as inline SVG —
  # set under `theme.icon.logo`, not `theme.logo` (which expects a file
  # path under docs_dir). favicon is intentionally unset: a deliberate
  # favicon file would have to live under docs/, and the project's
  # existing SVG emblems under assets/ are hash-verified upstream
  # imports — copying one into docs/ would create a hash-drift surface.
  # Material's default favicon ships until a favicon decision is taken.
  icon:
    logo: material/atom-variant
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: custom
      accent: custom
  font: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  # Material icon shortcodes (e.g. :material-telescope:) used on the
  # welcome page. Depends on mkdocs-material's own icon set being on the
  # Python path at build time — supplied by the `docs` extra.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Welcome: index.md
  - Overview: overview.md
  - Getting Started: getting-started.md
  - Project Framework: framework.md
  - Conventions: conventions.md
  - Phase 1 Architecture: phase-1-architecture.md
  - Benchmarks: benchmarks.md
  - Tutorials:
      - Overview: tutorials/index.md
      - "1. Carrier Rabi with shot-noise readout": tutorials/01_first_rabi_readout.md
      - "2. Red-sideband flopping from Fock |1⟩": tutorials/02_red_sideband_fock1.md
      - "3. Gaussian π-pulse with modulated_carrier": tutorials/03_gaussian_pi_pulse.md
      - "4. Mølmer–Sørensen Bell gate": tutorials/04_ms_gate_bell.md
      - "5. Custom observables": tutorials/05_custom_observables.md
      - "6. Fock truncation diagnosis": tutorials/06_fock_truncation.md
      - "7. Hash-verified cache round-trip": tutorials/07_cache_round_trip.md
      - "8. Full Lamb–Dicke for hot-ion regimes": tutorials/08_full_lamb_dicke.md
      - "9. Squeezed / coherent state preparation": tutorials/09_squeezed_coherent_prep.md
      - "10. Finite-shot statistics": tutorials/10_finite_shot_statistics.md
      - "11. Systematics: jitter ensembles": tutorials/11_jitter_ensembles.md
      - "12. Two-ion Bell-state entanglement": tutorials/12_bell_entanglement.md
      - "13. Reproducing Clos 2016 (PRL 117, 170401)": tutorials/13_reproducing_clos_2016.md
  - Boundary Decision Tree: boundary-decision-tree.md

extra_css:
  # tokens.css is vendored from threehouse-plus-ec/cd-rules at the commit
  # pinned in assets/SOURCE.md (Model B propagation per CD 0.10). The copy
  # under docs/stylesheets/ is maintained by tools/fetch_assets.sh and must
  # stay byte-identical to assets/tokens.css — the hash is verified against
  # assets/ only, so drifting the docs copy by hand is unsupported.
  - stylesheets/tokens.css
  # Local docs-site styling. Consumes custom properties from tokens.css
  # above; keep the order — tokens.css must load first for cascade.
  - stylesheets/extra.css
