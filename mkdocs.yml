site_name: iontrap-dynamics
site_description: Open-system quantum dynamics of trapped-ion spin-motion systems
# URLs reflect the current repo. On migration to `open-iontrap` (workplan §4),
# swap `uwarring82` → `open-iontrap` in the next three lines.
site_url: https://github.com/uwarring82/iontrap-dynamics
repo_url: https://github.com/uwarring82/iontrap-dynamics
repo_name: uwarring82/iontrap-dynamics

theme:
  name: material
  language: en
  logo: material/atom-variant
  favicon: material/atom-variant
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: custom
      accent: custom
  font: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  # Material icon shortcodes (e.g. :material-telescope:) used on the
  # welcome page. Depends on mkdocs-material's own icon set being on the
  # Python path at build time — supplied by the `docs` extra.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Welcome: index.md
  - Getting Started: getting-started.md
  - Project Framework: framework.md
  - Boundary Decision Tree: boundary-decision-tree.md

extra_css:
  - stylesheets/extra.css
