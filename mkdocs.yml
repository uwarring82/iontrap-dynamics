site_name: iontrap-dynamics
site_description: Open-system quantum dynamics of trapped-ion spin-motion systems
site_url: https://open-iontrap.github.io/iontrap-dynamics/
repo_url: https://github.com/open-iontrap/iontrap-dynamics
repo_name: open-iontrap/iontrap-dynamics

theme:
  name: material
  language: en
  logo: material/atom-variant
  favicon: material/atom-variant
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: custom
      accent: custom
  font: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Welcome: index.md
  - Getting Started: getting-started.md
  - Project Framework: framework.md
  - Boundary Decision Tree: boundary-decision-tree.md

extra_css:
  - stylesheets/extra.css
